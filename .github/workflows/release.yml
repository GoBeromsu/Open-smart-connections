# Synced from obsidian-boiler-template/tooling/sync/index.mjs. Do not edit this file directly.
name: Release plugin

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

env:
  PLUGIN_NAME: open-smart-connections

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      HUSKY: 0
      NODE_OPTIONS: '--max-old-space-size=4096'
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Rebuild better-sqlite3 for Node.js (tests)
        run: pnpm rebuild better-sqlite3
      - name: Validate release metadata
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          PACKAGE_VERSION="$(node --input-type=module -e "import fs from 'node:fs'; console.log(JSON.parse(fs.readFileSync('package.json', 'utf8')).version)")"
          MANIFEST_VERSION="$(node --input-type=module -e "import fs from 'node:fs'; console.log(JSON.parse(fs.readFileSync('manifest.json', 'utf8')).version)")"
          if [[ "$TAG" != "$PACKAGE_VERSION" ]]; then
            echo "Tag ${TAG} does not match package.json version ${PACKAGE_VERSION}" >&2
            exit 1
          fi
          if [[ "$PACKAGE_VERSION" != "$MANIFEST_VERSION" ]]; then
            echo "package.json version ${PACKAGE_VERSION} does not match manifest.json version ${MANIFEST_VERSION}" >&2
            exit 1
          fi
      - name: Run CI
        run: pnpm run ci
      - name: Package better-sqlite3 for Obsidian Electron
        run: |
          OBSIDIAN_ELECTRON_VERSION="39.5.1"
          mkdir -p sqlite-dist/node_modules
          npm install --prefix sqlite-dist better-sqlite3 --no-save --ignore-scripts
          npm install --prefix sqlite-dist @electron/rebuild --no-save
          ./sqlite-dist/node_modules/.bin/electron-rebuild \
            --version "$OBSIDIAN_ELECTRON_VERSION" \
            --module-dir ./sqlite-dist/node_modules/better-sqlite3
      - name: Generate Release Notes
        run: node scripts/release-notes.mjs --output .github-release-body.md
      - name: Prepare Release Assets
        id: release_assets
        shell: bash
        run: |
          set -euo pipefail
          copy_asset() {
            local source="$1"
            local required="$2"
            if [[ -f "$source" ]]; then
              cp "$source" "${{ env.PLUGIN_NAME }}/"
            elif [[ "$required" == "true" ]]; then
              echo "Required release asset missing: $source" >&2
              exit 1
            fi
          }
          publish_asset() {
            local source="$1"
            local required="$2"
            if [[ -f "$source" ]]; then
              printf "%s\n" "$source" >> .release-files.txt
            elif [[ "$required" == "true" ]]; then
              echo "Required publish asset missing: $source" >&2
              exit 1
            fi
          }
          mkdir "${{ env.PLUGIN_NAME }}"
          : > .release-files.txt
          copy_asset "dist/main.js" "true"
          copy_asset "dist/manifest.json" "true"
          copy_asset "dist/styles.css" "true"
          # Bundle better-sqlite3 so the native addon is available at runtime
          cp -r sqlite-dist/node_modules "${{ env.PLUGIN_NAME }}/node_modules"
          zip -r "${{ env.PLUGIN_NAME }}.zip" "${{ env.PLUGIN_NAME }}"
          publish_asset "${{ env.PLUGIN_NAME }}.zip" "true"
          publish_asset "dist/main.js" "true"
          publish_asset "dist/manifest.json" "true"
          publish_asset "dist/styles.css" "true"
          publish_asset "versions.json" "true"
          {
            echo "files<<EOF"
            cat .release-files.txt
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: .github-release-body.md
          files: ${{ steps.release_assets.outputs.files }}
